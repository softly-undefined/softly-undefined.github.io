<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stopwatch</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="tool-body">
    <main class="tool-shell">
      <p><a href="secret_index.html">Back to secret page</a></p>
      <h1>Stopwatch</h1>
      <div class="tool-panel stopwatch-panel">
        <div class="stopwatch-time" id="stopwatch-time">00:00.0</div>
        <div class="tool-row">
          <button id="start-stopwatch" type="button">Start</button>
          <button id="stop-stopwatch" type="button">Stop</button>
          <button id="reset-stopwatch" type="button">Reset</button>
          <button id="split-stopwatch" type="button">Split</button>
        </div>
        <ol class="split-list" id="split-list"></ol>
      </div>
    </main>

    <script>
      const timeDisplay = document.querySelector("#stopwatch-time");
      const splitList = document.querySelector("#split-list");
      let startTime = 0;
      let elapsed = 0;
      let interval = null;
      let splitCount = 0;

      function formatTime(milliseconds) {
        const tenthsTotal = Math.floor(milliseconds / 100);
        const minutes = Math.floor(tenthsTotal / 600);
        const seconds = Math.floor((tenthsTotal % 600) / 10);
        const tenths = tenthsTotal % 10;

        return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}.${tenths}`;
      }

      function currentElapsed() {
        return interval ? elapsed + performance.now() - startTime : elapsed;
      }

      function renderTime() {
        timeDisplay.textContent = formatTime(currentElapsed());
      }

      document.querySelector("#start-stopwatch").addEventListener("click", () => {
        if (interval) {
          return;
        }

        startTime = performance.now();
        interval = setInterval(renderTime, 100);
        renderTime();
      });

      document.querySelector("#stop-stopwatch").addEventListener("click", () => {
        if (!interval) {
          return;
        }

        elapsed = currentElapsed();
        clearInterval(interval);
        interval = null;
        renderTime();
      });

      document.querySelector("#reset-stopwatch").addEventListener("click", () => {
        clearInterval(interval);
        interval = null;
        elapsed = 0;
        splitCount = 0;
        splitList.textContent = "";
        renderTime();
      });

      document.querySelector("#split-stopwatch").addEventListener("click", () => {
        splitCount += 1;
        const item = document.createElement("li");
        item.textContent = `Split ${splitCount}: ${formatTime(currentElapsed())}`;
        splitList.append(item);
      });
    </script>
  </body>
</html>

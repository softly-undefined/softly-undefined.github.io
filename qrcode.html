<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
  </head>
  <body class="tool-body">
    <main class="tool-shell">
      <p><a href="secret_index.html">Back to secret page</a></p>
      <h1>QR Code Generator</h1>
      <div class="tool-panel">
        <label for="qr-input">Text or URL</label>
        <div class="tool-row">
          <input id="qr-input" type="text" placeholder="https://example.com" />
          <button id="qr-generate" type="button">Generate</button>
        </div>
        <div class="qr-output" id="qr-output" aria-live="polite"></div>
        <button id="qr-download" type="button" hidden>Download PNG</button>
      </div>
    </main>

    <script>
      const qrOutput = document.querySelector("#qr-output");
      const qrInput = document.querySelector("#qr-input");
      const generate = document.querySelector("#qr-generate");
      const download = document.querySelector("#qr-download");
      const qrcode = new QRCode(qrOutput, {
        width: 256,
        height: 256,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H,
      });

      function makeQr() {
        const value = qrInput.value.trim();

        if (!value) {
          qrInput.focus();
          return;
        }

        qrcode.makeCode(value);
        download.hidden = false;
      }

      generate.addEventListener("click", makeQr);
      qrInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          makeQr();
        }
      });

      download.addEventListener("click", () => {
        const canvas = qrOutput.querySelector("canvas");
        const image = qrOutput.querySelector("img");
        const url = canvas ? canvas.toDataURL("image/png") : image?.src;

        if (!url) {
          return;
        }

        const link = document.createElement("a");
        link.href = url;
        link.download = "qr-code.png";
        link.click();
      });
    </script>
  </body>
</html>

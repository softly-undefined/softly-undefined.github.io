<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asciify 2</title>
  <link rel="stylesheet" href="styles.css?v=20260614-color-toggle-2">
</head>
<body>
  <main>
    <header>
      <h1>Asciify 2</h1>
      <p>
        Turn an image into variable-width ASCII art calibrated for Arial in
        Google Docs.
      </p>
    </header>

    <hr>

    <section aria-labelledby="convert-heading">
      <h2 id="convert-heading">Convert an image</h2>

      <form id="convert-form">
        <label class="drop-zone" id="drop-zone" for="image-input">
          <strong id="file-label">Choose an image or drop it here</strong>
          <span>PNG, JPEG, WebP, GIF, or BMP</span>
          <input
            id="image-input"
            name="image"
            type="file"
            accept="image/png,image/jpeg,image/webp,image/gif,image/bmp"
          >
        </label>

        <div class="controls">
          <label for="font-size">
            Google Docs font size
            <select id="font-size" name="font-size">
              <option value="1">1 (displayed as 2.25pt, slowest)</option>
              <option value="5">5 (slow)</option>
              <option value="8">8</option>
              <option value="11" selected>11 (recommended)</option>
              <option value="15">15</option>
              <option value="20">20 (fastest)</option>
            </select>
          </label>

          <label class="toggle-control" for="color-mode">
            <input id="color-mode" name="color-mode" type="checkbox">
            <span>
              Color output
              <small>Uses a limited RGB palette and copies rich text.</small>
            </span>
          </label>

          <div class="button-row">
            <button id="convert-button" type="submit">Asciify</button>
            <button id="cancel-button" type="button" hidden>Cancel</button>
          </div>
        </div>
      </form>

      <p class="hint" id="font-hint">
        Size 11 usually takes several seconds. Smaller sizes produce more text
        and take longer.
      </p>

      <div class="preview-shell" id="preview-shell" hidden>
        <img id="image-preview" alt="Selected image preview">
      </div>

      <div class="progress-shell" id="progress-shell" hidden>
        <div class="status-row">
          <span id="status-text" role="status" aria-live="polite"></span>
          <span id="progress-label"></span>
        </div>
        <progress id="progress" max="1" value="0"></progress>
      </div>

      <p class="error" id="error-message" role="alert" hidden></p>
    </section>

    <section id="result-section" aria-labelledby="result-heading" hidden>
      <hr>
      <div class="result-heading">
        <div>
          <h2 id="result-heading">Result</h2>
          <p id="result-summary"></p>
        </div>
        <button id="copy-button" type="button">Copy to clipboard</button>
      </div>
      <div class="result-scroll">
        <pre id="ascii-output" tabindex="0"></pre>
      </div>
    </section>
  </main>

  <script type="module" src="app.js?v=20260614-color-toggle-2"></script>
</body>
</html>
